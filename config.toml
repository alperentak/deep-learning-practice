random_seed = 42
experiment_config_path = "./experiment.toml"
model_save_dir = "./models"
eval_results_path = "./eval_results.json"

### DATASETS ###

[[datasets]]
name = "dataset_01"
data_dir = "./data/PetImages/"
train_test_split = 0.8

    [[datasets.train.transforms]]
    name = "Resize"
    args = [[224, 224]]
    [[datasets.train.transforms]]
    name = "RandomHorizontalFlip"
    args = [0.5]
    [[datasets.train.transforms]]
    name = "ToTensor"

    [[datasets.test.transforms]]
    name = "Resize"
    args = [[224, 224]]
    [[datasets.test.transforms]]
    name = "ToTensor"

[[datasets]]
name = "dataset_02"
data_dir = "./data/pizza_steak_sushi/"
train_test_split = 0.8

    [[datasets.train.transforms]]
    name = "Resize"
    args = [[224, 224]]
    [[datasets.train.transforms]]
    name = "RandomHorizontalFlip"
    args = [0.5]
    [[datasets.train.transforms]]
    name = "ToTensor"

    [[datasets.test.transforms]]
    name = "Resize"
    args = [[224, 224]]
    [[datasets.test.transforms]]
    name = "ToTensor"

### DATALOADERS ###
[[dataloaders]]
name = "dataloader_01"
[dataloaders.train.kwargs]
batch_size = 64
num_workers = 4
pin_memory = true
[dataloaders.test.kwargs]
batch_size = 64
num_workers = 0

### MODELS ###

[[models]]
name = "model_01"
type = "BaselineModel"
[models.kwargs]
input_shape = 150528
hidden_units = 10
output_shape = 10


[[models]]
name = "model_02"
type = "CNNModel"
[models.kwargs]
input_shape = 3
hidden_units = 10
output_shape = 10

### TRAINERS ###

[[trainers]]
name = "trainer_01"
epochs = 50
device = "cuda"
[trainers.loss_fn]
type = "CrossEntropyLoss"
kwargs = {}
[trainers.optimizer]
type = "Adam"
kwargs = {lr = 0.003}


[[trainers]]
name = "trainer_02"
epochs = 50
device = "cuda"
[trainers.loss_fn]
type = "CrossEntropyLoss"
kwargs = {}
[trainers.optimizer]
type = "SGD"
kwargs = {lr = 0.003}

### EVALUATORS ###

[[evaluators]]
name = "eval_01"
device = "cuda"
[evaluators.loss_fn]
type = "CrossEntropyLoss"
kwargs = {}
